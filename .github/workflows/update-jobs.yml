name: Update jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update-jobs.yml"

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate collector syntax
        run: python -m py_compile scripts/update_jobs.py scripts/extra_discovery.py

      - name: Discover and enrich jobs
        run: python scripts/update_jobs.py --workers 6 --max-detail-pages 300

      - name: Discover from expanded GitHub lists
        run: python scripts/extra_discovery.py --workers 6 --max-detail-pages 250 --skip-google

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/jobs.csv data/jobs.json
          git commit -m "chore: update 2027 new-grad jobs"
          git pull --rebase origin main
          git push origin HEAD:main
