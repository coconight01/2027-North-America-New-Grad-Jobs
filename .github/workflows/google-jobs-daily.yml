name: Google Jobs daily discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "43 8 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/google-jobs-daily.yml"

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: true

jobs:
  google-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: env.SERPAPI_KEY != ''
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: env.SERPAPI_KEY != ''
        run: python -m pip install -r requirements.txt

      - name: Validate collector syntax
        if: env.SERPAPI_KEY != ''
        run: python -m py_compile scripts/update_jobs.py scripts/extra_discovery.py scripts/order_jobs.py

      - name: Discover Google Jobs
        id: google_discovery
        if: env.SERPAPI_KEY != ''
        continue-on-error: true
        run: python scripts/extra_discovery.py --workers 5 --max-detail-pages 120 --skip-github

      - name: Apply new-grad qualification and date-first order
        if: env.SERPAPI_KEY != '' && steps.google_discovery.outcome == 'success'
        run: python scripts/order_jobs.py

      - name: Record Google Jobs status
        env:
          DISCOVERY_OUTCOME: ${{ steps.google_discovery.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          configured = bool(os.environ.get("SERPAPI_KEY", "").strip())
          outcome = os.environ.get("DISCOVERY_OUTCOME", "skipped")
          status = {
              "configured": configured,
              "discovery_outcome": outcome,
              "checked_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
          }
          Path("data").mkdir(exist_ok=True)
          Path("data/google_jobs_status.json").write_text(
              json.dumps(status, indent=2) + "\n", encoding="utf-8"
          )
          print(status)
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- README.md data
          if git diff --cached --quiet; then
            echo "No Google Jobs changes."
            exit 0
          fi
          git commit -m "chore: update jobs from Google Jobs"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail when Google discovery failed
        if: env.SERPAPI_KEY != '' && steps.google_discovery.outcome == 'failure'
        run: exit 1
