name: Google Jobs daily discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "43 8 * * *"

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: false

jobs:
  google-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Discover Google Jobs
        run: python scripts/extra_discovery.py --workers 5 --max-detail-pages 120 --skip-github

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No Google Jobs changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/jobs.csv data/jobs.json
          git commit -m "chore: update jobs from Google Jobs"
          git push
